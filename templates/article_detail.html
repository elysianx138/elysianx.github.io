<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ detail.title }} - MyBlog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/article_detail.css') }}">
</head>
<body>
    <div class="bg-gradient"></div>

    <nav class="navbar">
        <div class="nav-content">
            <a href="/" class="nav-brand">
                <div class="nav-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <span class="nav-title">MyBlog</span>
            </a>

            <div class="nav-links">
                <a href="/" class="nav-link">首页</a>
                <a href="/articles_list" class="nav-link">文章</a>
                <a href="/add" class="nav-link">写文章</a>
            </div>

            <div class="nav-user">
                {% if current_user.is_authenticated %}
                <a href="/profile/{{ current_user.username }}" class="nav-btn nav-btn-outline">{{ current_user.username }}</a>
                <a href="/logout" class="nav-btn nav-btn-primary">退出</a>
                {% else %}
                <a href="/login" class="nav-btn nav-btn-outline">登录</a>
                <a href="/register" class="nav-btn nav-btn-primary">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-container">
        <article class="article-detail">
            <header class="article-header">
                <a href="/articles_list" class="back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    返回文章列表
                </a>
                
                <h1 class="article-title">{{ detail.title }}</h1>
                
                <div class="article-meta">
                    <div class="meta-author">
                        <div class="author-avatar">{{ detail.author[0] }}</div>
                        <span class="author-name">{{ detail.author }}</span>
                    </div>
                    <span class="meta-divider">·</span>
                    <span class="meta-date">{{ detail.date }}</span>
                </div>
            </header>

            <div class="article-body">
                <p>{{ detail.body }}</p>
            </div>

            <footer class="article-footer">
                <a href="/articles_list" class="footer-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    返回文章列表
                </a>
            </footer>
        </article>
    </main>

    <footer class="footer">
        <p class="footer-text">© 2026 MyBlog</p>
    </footer>
</body>
</html>
