{% extends 'base.html' %}
{% block title %}{{ detail.title }} - MyBlog{% endblock %}
{% block content %}
<div class="main-wrapper">
    <div>
        <div class="card">
            <div class="detail-header">
                <a href="/articles_list" class="detail-back">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    返回文章列表
                </a>
                <h1 class="detail-title">{{ detail.title }}</h1>
                <div class="detail-meta">
                    <span>{{ detail.author }}</span>
                    <span>&middot;</span>
                    <span>{{ detail.date }}</span>
                </div>
            </div>
            <div class="md-body detail-body">{{ detail.body }}</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="widget">
            <div class="widget-header">关于作者</div>
            <div class="widget-body">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="width:40px;height:40px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--accent);font-weight:700;">{{ detail.author[0] }}</div>
                    <div>
                        <div style="font-size:14px;font-weight:600;color:var(--text);">{{ detail.author }}</div>
                        <div style="font-size:11px;color:var(--text-muted);">作者</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="widget">
            <div class="widget-header">相关操作</div>
            <div class="widget-body" style="padding:10px 14px;">
                <div class="quick-links">
                    <a href="/articles_list" class="quick-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        返回列表
                    </a>
                    <a href="/add" class="quick-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        写篇文章
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
