{% extends 'base.html' %}
{% block title %}标签 - MyBlog{% endblock %}
{% block content %}
<div class="main-wrapper">
    <div>
        <div class="page-header">
            <h1>标签</h1>
            <p>共 {{ tags|length }} 个标签</p>
        </div>

        {% if tags %}
        <div class="card tag-cloud">
            {% for name, count in tags %}
            <a href="/tag/{{ name }}" class="tag-cloud-item" style="font-size: {{ [13 + count * 2, 26]|min }}px;">
                {{ name }}<sup>{{ count }}</sup>
            </a>
            {% endfor %}
        </div>
        {% else %}
        <div class="empty-state">
            <p>还没有任何标签</p>
            <a href="/add" style="color:var(--accent); font-size:13px;">写篇带标签的文章</a>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
