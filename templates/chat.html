{% extends 'base.html' %}
{% block title %}{{ room_name }} - MyBlog{% endblock %}
{% block content %}
<div style="max-width:900px; margin:0 auto; padding:20px;">
    <h2 style="font-size:24px; margin-bottom:20px;">{{ room_name }}</h2>
    
    <div id="messages" style="min-height:400px; overflow-y:auto; padding:20px; background:var(--bg-card); border-radius:12px; margin-bottom:20px;">
        {% for msg in messages|reverse %}
        <div style="margin-bottom:16px; padding:12px; background:var(--bg-secondary); border-radius:10px;">
            <div style="font-size:13px; color:var(--text-muted); margin-bottom:6px;">
                <strong style="color:var(--accent);">{{ msg['username'] }}</strong> · {{ msg['created_at'] }}
            </div>
            <div style="font-size:15px; line-height:1.5;">{{ msg['content'] }}</div>
        </div>
        {% endfor %}
    </div>
    
    <form method="POST" action="/chat/1/send">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div style="display:flex; gap:12px;">
            <input type="text" name="content" placeholder="输入消息..." 
                   style="flex:1; padding:14px; border:1px solid var(--border); border-radius:10px; font-size:15px;"
                   required>
            <button type="submit" class="btn-submit" style="padding:14px 28px; font-size:15px; border-radius:10px;">发送</button>
        </div>
    </form>
</div>
{% endblock %}
