{% extends 'base.html' %}
{% block title %}首页 - MyBlog{% endblock %}
{% block content %}
<div class="main-wrapper">
    <!-- Left: Main Content -->
    <div>
        <!-- Page Header -->
        <div class="page-header">
            <h1 id="pageTitle">加载中...</h1>
            <p>记录思想，分享见解</p>
        </div>

        <div id="authSection" class="card" style="margin-bottom:24px; text-align:center; display:none;">
            <p style="font-size:14px; color:var(--text-secondary); margin-bottom:14px;">加入我们，开始你的创作之旅</p>
            <div style="display:flex; gap:10px; justify-content:center;">
                <a href="/register" class="btn-secondary" style="width:auto; padding:10px 24px; text-decoration:none;">注册账号</a>
                <a href="/login" class="btn-secondary" style="width:auto; padding:10px 24px; text-decoration:none;">已有账号</a>
            </div>
        </div>

        <!-- Articles Section -->
        <div class="card" style="margin-bottom:20px;">
            <div class="card-title" style="justify-content:space-between;">
                <span style="display:flex;align-items:center;gap:8px;">
                    <span style="width:4px;height:16px;background:var(--accent);border-radius:2px;"></span>
                    最新文章
                </span>
                <a href="/articles_list" style="font-size:12px; color:var(--accent); font-weight:400;">查看全部</a>
            </div>

            <div id="articleList" class="article-list">
                <div class="empty-state"><p>加载中...</p></div>
            </div>
        </div>
    </div>

    <!-- Right: Sidebar -->
    <div class="sidebar">

        <!-- Site Stats -->
        <div class="widget">
            <div class="widget-header">站点统计</div>
            <div class="widget-body">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-num" id="statArticles">—</div>
                        <div class="stat-lbl">文章</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-num" id="statUsers">—</div>
                        <div class="stat-lbl">用户</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-num" id="statFiles">—</div>
                        <div class="stat-lbl">文件</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-num">—</div>
                        <div class="stat-lbl">访问</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Announcements -->
        <div id="announcementWidget" class="widget" style="display:none;">
            <div class="widget-header">公告</div>
            <div id="announcementBody" class="widget-body" style="padding:14px 18px;"></div>
        </div>

        <!-- Quick Links -->
        <div class="widget">
            <div class="widget-header">快捷入口</div>
            <div class="widget-body" style="padding:10px 14px;">
                <div class="quick-links">
                    <a href="/articles_list" class="quick-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        文章列表
                    </a>
                    <a href="/files_list" class="quick-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        文件资料
                    </a>
                    <a href="/add" class="quick-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        写篇文章
                    </a>
                    <a id="profileLink" href="/profile" class="quick-link" style="display:none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        我的资料
                    </a>
                </div>
            </div>
        </div>

        <!-- Chat Rooms -->
        <div class="widget">
            <div class="widget-header">聊天室</div>
            <div class="widget-body" style="padding:10px 14px;">
                <div class="quick-links">
                    <a href="/chat/1" class="quick-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        综合讨论
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Chat Modal -->
<div id="chatModal" style="display:none; position:fixed; inset:0; z-index:1000; background:var(--bg-page);">
    <div style="background:var(--bg-card); width:95%; max-width:1200px; height:90%; margin:2% auto; border-radius:12px; display:flex; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.3);">
        <div style="width:220px; border-right:1px solid var(--border); padding:16px; overflow-y:auto; background:var(--bg-secondary);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h3 style="font-size:18px; margin:0;">聊天室</h3>
                <button onclick="closeChat()" style="background:none; border:none; cursor:pointer; padding:4px;">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div id="chatRoomList"></div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; padding:16px;">
            <div style="padding-bottom:12px; border-bottom:1px solid var(--border); margin-bottom:12px;">
                <h2 id="chatRoomTitle" style="font-size:20px; margin:0;">聊天室</h2>
            </div>
            <div id="chatMessages" style="flex:1; overflow-y:auto; background:var(--bg-secondary); border-radius:12px; padding:16px; margin-bottom:12px;"></div>
            <form id="chatForm" onsubmit="sendChatMessage(event)">
                <div style="display:flex; gap:8px;">
                    <input type="text" id="chatInput" placeholder="输入消息..." style="flex:1; padding:12px; border:1px solid var(--border); border-radius:8px; font-size:14px;">
                    <button type="submit" class="btn-submit" style="padding:12px 24px; font-size:14px;">发送</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
var currentChatRoom = 1;

function openChat(roomId) {
    currentChatRoom = roomId;
    document.getElementById('chatModal').style.display = 'flex';
    loadChatRooms();
    loadChatMessages();
}

function closeChat() {
    document.getElementById('chatModal').style.display = 'none';
}

function loadChatRooms() {
    var roomNames = ['综合讨论', '技术交流', '闲置物品'];
    var html = '';
    for (var i = 1; i <= 3; i++) {
        html += '<div onclick="switchChatRoom(' + i + ')" style="padding:10px; margin-bottom:6px; border-radius:6px; cursor:pointer; background:' + (currentChatRoom == i ? 'var(--accent-light)' : 'var(--bg-secondary)') + ';">' + roomNames[i-1] + '</div>';
    }
    document.getElementById('chatRoomList').innerHTML = html;
    document.getElementById('chatRoomTitle').innerText = roomNames[currentChatRoom - 1];
}

function switchChatRoom(roomId) {
    currentChatRoom = roomId;
    loadChatRooms();
    loadChatMessages();
}

function loadChatMessages() {
    fetch('/chat/' + currentChatRoom)
    .then(function(response) { return response.text(); })
    .then(function(html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var msgDiv = doc.getElementById('messages');
        if (msgDiv) {
            var container = document.getElementById('chatMessages');
            container.innerHTML = msgDiv.innerHTML;
            container.scrollTop = container.scrollHeight;
        }
    }).catch(function(err) {
        console.error('加载消息失败:', err);
    });
}

function sendChatMessage(e) {
    e.preventDefault();
    var input = document.getElementById('chatInput');
    var content = input.value.trim();
    if (!content) return;
    
    var formData = new FormData();
    formData.append('content', content);
    
    fetch('/chat/' + currentChatRoom + '/send', {
        method: 'POST',
        body: formData
    }).then(function() {
        input.value = '';
        loadChatMessages();
    }).catch(function(err) {
        console.error('发送失败:', err);
    });
}

setInterval(function() {
    if (document.getElementById('chatModal').style.display !== 'none') {
        loadChatMessages();
    }
}, 1000);
</script>
<script src="{{ url_for('static', filename='js/index.js') }}"></script>
</div>
{% endblock %}
