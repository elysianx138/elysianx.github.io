name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t docker_test:latest .
        echo "🐧 The job was automatically triggered"

    - name: Run tests inside container
      run: |
        docker run docker_test:latest sh -c "pip install pytest && python -m pytest tests/"
        echo "✅ Tests passed successfully"

    - name: Log in to Github Action Container Registry
      run: |
        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        echo "🔒 Have logged in to Github Container Registry"

    - name: Push image
      run: |
        docker tag docker_test:latest ghcr.io/${{ github.repository }} && docker push ghcr.io/${{ github.repository }}
        echo "🚀 The image was pushed to Github Container Registry"